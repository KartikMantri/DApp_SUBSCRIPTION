        <div id="title">
            SUBSCRIPTION BASED DECENTRALIZED ACCESS APP

        <div class="ACCESS_CONTROLS1">

            <div id="Check_Fees">
                Check latest FEES for the subscription

                Check the duration for the subscription 
                <button id="C_D1">Submit</button>
            </div>


            <div id="Check_Expiry">
                Check expiry for the subscription 
                <input type="text"  placeholder="Enter your address">
                <button id="C_E1">Submit</button>
            </div>
